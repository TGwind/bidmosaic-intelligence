name: collect-rss

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS collector
        run: python -m pipelines.rss.collector

      - name: Commit raw data
        run: |
          git config user.name "BidMosaic Bot"
          git config user.email "bot@bidmosaic.com"
          git add data/raw/rss/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: collect RSS data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
