name: collect-stock

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock collector
        run: python -m pipelines.stock.market_collector

      - name: Commit raw stock data
        run: |
          git config user.name "BidMosaic Bot"
          git config user.email "bot@bidmosaic.com"
          git add data/raw/stock/
          if git diff --staged --quiet; then
            echo "No new stock data to commit"
          else
            git commit -m "chore: collect stock data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
