name: collect-trending

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trending collector
        env:
          DAILYHOT_API_URL: ${{ vars.DAILYHOT_API_URL }}
        run: python -m pipelines.trending.collector

      - name: Commit raw trending data
        run: |
          git config user.name "BidMosaic Bot"
          git config user.email "bot@bidmosaic.com"
          git add data/raw/trending/
          if git diff --staged --quiet; then
            echo "No new trending data to commit"
          else
            git commit -m "chore: collect trending data $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
